asyncapi: 2.6.0
info:
  title: set_operating_mode — Zebra Handheld RFID Reader
  version: 1.1.0
  description: |
    ## Overview

    | Field | Value |
    |-------|-------|
    | **Command** | `set_operating_mode` |
    | **Interface** | CTRL (Control) |
    | **Communication** | Bidirectional — Cloud to Device (command), Device to Cloud (response) |
    | **MQTT Version** | 3.1.1 |
    | **API Version** | V1.1 |
    | **Applies To** | RFD40 Series, RFD90 Series |
    | **Last Updated** | 2026-04-16 |

    Configures the operating mode of a Zebra handheld RFID reader, controlling how the radio operates
    during inventory and access operations. This command sets the reader's operational profile, RF
    parameters, tag access operations (read, write, lock, kill), radio start/stop trigger conditions,
    EPC Gen2 query and select parameters, and which tag metadata fields are reported in data events.

    This is the most complex command in the Control domain and **must be configured before starting an
    inventory operation** via `control_operation`.

    > ⚠️ **Warning — FAST_READ profile:** When the RFD40/90 sled is configured to the `FAST_READ`
    > profile, data events (`dataEVT`) are **not currently supported**.

    ---

    ## Use Cases

    ### Warehouse Inventory Scanning

    A warehouse management system configures readers for high-throughput dock-door scanning. The
    operator sets the `BALANCED_PERFORMANCE` profile, enables `RSSI` and `EPC` in tag metadata for
    location-aware processing, and configures `radioStopConditions` with a `stopTimeout` of 30 seconds
    to automatically end each scan cycle. Select pre-filters target only tags with a company-specific
    EPC prefix, preventing the system from processing tags belonging to neighboring tenants.

    ### Asset Tracking with Localization

    A manufacturing floor uses multiple RFD90 readers mounted at zone boundaries to track
    work-in-progress containers. The system sets the `ADVANCED` profile with a custom `linkProfile`
    of `M4_256K` for dense tag environments, enables `RSSI`, `PHASE`, and `SEENCOUNT` metadata to
    feed a real-time location engine, and configures `SESSION_1` with `STATE_AB` to ensure every tag
    is seen on each inventory round regardless of prior state.

    ### Selective Tag Writing

    An encoding station writes serialized product data to tags as items move through a packaging line.
    The operator configures `accessOperations` with a `WRITE` operation targeting the `USER` memory
    bank and a `LOCK` operation to permanently protect the written data. A select pre-filter narrows
    the operation to only the tag currently in the encoding zone by matching a staging EPC pattern,
    preventing accidental writes to tags in neighboring areas.

    ### Cycle Count Optimization

    A retail store performs nightly cycle counts across thousands of items. The system sets the
    `CYCLE_COUNT` profile optimized for maximum unique tag reads, configures `radioStartConditions`
    with `trigger: "PRESSED"` and `repeat: true` so associates can start and stop scans with the
    trigger button, and sets `tagPopulation` to `500` so the reader optimizes its anti-collision
    algorithm for the expected tag density per aisle.

    ### Battery-Conscious Field Operations

    Mobile workers using RFD40 sleds in outdoor environments need to maximize battery life across
    full shifts. The system sets the `OPTIMAL_BATTERY` profile, disables all non-essential tag
    metadata (keeping only `EPC`), and configures `radioStopConditions` with `tagCount: 1` so the
    radio powers down immediately after reading the target tag per scan, minimizing power consumption.

    ---

    ## Related Commands

    | Command | Relationship |
    |---------|-------------|
    | `get_operating_mode` | Retrieves the current operating mode configuration set by this command |
    | `control_operation` | Starts or stops inventory/scan operations using the operating mode set by this command |
    | `set_post_filter` | Configures post-filters applied to tag data after the operating mode filters |
    | `config_events` | Enables or disables the event types that report data collected under this mode |

    ---

    ## Command / Response Flow

    ```
    Client  ──publish──▶  {tenantId}/CTRL/clients/cmnd/{deviceSerial}
                               command: "set_operating_mode"
                               requestId: "<uuid>"
                               operatingMode: { operatingModes: { ... } }

    Reader  ──publish──▶  {tenantId}/CTRL/clients/resp/{deviceSerial}
                               command: "set_operating_mode"
                               requestId: "<uuid>"   ← echoed for correlation
                               apiVersion: "V1.1"
                               response: { code: 0, description: "Success" }
    ```

  contact:
    name: Zebra Technologies Developer Support
    url: https://developer.zebra.com
  license:
    name: Proprietary
    url: https://www.zebra.com

